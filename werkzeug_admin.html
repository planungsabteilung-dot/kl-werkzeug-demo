.icobtn{width:38px;height:38px;border-radius:9px;border:1px solid var(--line2);background:var(--bg3);color:var(--text2);font-size:17px;cursor:pointer}

.tabs button.on{background:var(--acc);color:#fff;box-shadow:0 4px 14px var(--glow)}
.pane{display:none}.pane.on{display:block}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px;margin-bottom:16px}
.kpi{background:var(--glass2);backdrop-filter:blur(12px);border:1px solid var(--line2);border-radius:14px;padding:14px}
.kpi-t{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);font-family:var(--fn2)}
.kpi-v{font-size:26px;font-weight:900;letter-spacing:-.02em;margin-top:4px;line-height:1}
.kpi-s{font-size:10px;color:var(--text3);font-family:var(--fn2);margin-top:4px}
.kpi.money .kpi-v{color:var(--acc)}.kpi.out .kpi-v{color:var(--acc2)}.kpi.rep .kpi-v{color:var(--acc4)}.kpi.lost .kpi-v{color:var(--acc4)}

.search{flex:1;min-width:180px;min-height:44px;padding:11px 13px;border-radius:11px;border:1px solid var(--line2);background:var(--glass2);color:var(--text);font-family:var(--fn);font-size:15px}

table{width:100%;border-collapse:collapse}
.tbl-wrap{background:var(--glass2);border:1px solid var(--line2);border-radius:14px;overflow:hidden}
th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);font-family:var(--fn2);padding:11px 13px;border-bottom:1px solid var(--line2)}
td{padding:11px 13px;border-bottom:1px solid var(--line);font-size:13.5px}
tr:last-child td{border-bottom:none}
tr.row{cursor:pointer}tr.row:hover td{background:var(--bg2)}
.pill{font-size:10px;font-weight:800;font-family:var(--fn2);padding:3px 8px;border-radius:20px;white-space:nowrap}

.tl::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line2)}
.tl-i{position:relative;padding:0 0 14px 4px}
.tl-i::before{content:'';position:absolute;left:-19px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--acc);border:2px solid var(--bg1)}
.tl-t{font-size:13.5px;font-weight:700}.tl-d{font-size:11px;color:var(--text3);font-family:var(--fn2);margin-top:2px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:500;background:var(--bg1);border:1px solid var(--line2);border-radius:13px;padding:13px 18px;font-size:14px;font-weight:700;box-shadow:0 10px 40px rgba(0,0,0,.4);opacity:0;transition:all .3s}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}.toast.ok{color:var(--acc3)}
@media print{.top,.tabs,.qr-tools,.sec-h,.bar,.hint{display:none!important}.wrap{max-width:100%}.qr-sheet{grid-template-columns:repeat(4,1fr)}}

  {id:'t4',qr:'KLW:9a44',inv:'WZ-021',name:'Bosch GLM 50 Laser',icon:'📏',holder:'wh',status:'wh',cat:'c3',owner:'KL',cost:205,hist:[{ts:Date.now()-86400000*20,type:'t_return',who:'e3'}]},
  {id:'t5',qr:'KLW:c6f0',inv:'WZ-030',name:'Flex Kartuschenpistole',icon:'🧴',holder:'e2',status:'out',cat:'c2',owner:'KL',cost:38,hist:[{ts:Date.now()-86400000*5,type:'t_issue',who:'wh',to:'e2'}]},
  {id:'t6',qr:'KLW:1e77',inv:'WZ-050',name:'Bosch GST Stichsäge',icon:'🪚',holder:'b1',status:'bau',cat:'c1',owner:'Atlant',cost:118,hist:[{ts:Date.now()-86400000*4,type:'t_bau',who:'wh',to:'b1'}]},
  {id:'t7',qr:'KLW:88ba',inv:'WZ-051',name:'Metabo Schweißgerät',icon:'🔥',holder:'wh',status:'rep',cat:'c5',owner:'LK',cost:890,hist:[{ts:Date.now()-86400000*8,type:'t_repair',who:'e1'}]},
  {id:'t8',qr:'KLW:4c31',inv:'WZ-052',name:'Hilti TE 60 Kombihammer',icon:'🔨',holder:'wh',status:'wh',cat:'c1',owner:'LK',cost:540,hist:[{ts:Date.now()-86400000*30,type:'t_return',who:'e2'}]}
 ]};}
let db=load();
function load(){try{const d=JSON.parse(localStorage.getItem(SK));if(d&&d.tools&&d.tools.length)return enrich(d);}catch(e){}const s=seed();localStorage.setItem(SK,JSON.stringify(s));return s;}
function enrich(d){d.tools.forEach(x=>{if(x.cost==null&&DEMO_COST[x.inv]!=null)x.cost=DEMO_COST[x.inv];if(!x.owner)x.owner='KL';if(!x.status)x.status=(x.holder==='wh'?'wh':LOCATIONS.find(l=>l.id===x.holder)?'bau':'out');});return d;}
function save(){localStorage.setItem(SK,JSON.stringify(db));}
function holderName(id){const p=db.people.find(p=>p.id===id);if(p)return p.name;const l=LOCATIONS.find(l=>l.id===id);return l?l.name:'—';}
function assetClass(c){if(c==null||c==='')return null;c=+c;if(c<250)return'asset_bis';if(c<=800)return'asset_gwg';return'asset_anl';}
function toast(m){const el=$('#toast');el.textContent=m;el.classList.add('on');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),2200);}

function stats(){const s={total:0,value:0,out:0,rep:0,lost:0,over:0};db.tools.forEach(x=>{if(x.status==='ausgemustert')return;s.total++;const c=x.cost||0;s.value+=c;if(x.status==='out'||x.status==='bau')s.out+=c;if(x.status==='rep')s.rep+=c;if(x.status==='lost'||x.status==='verloren')s.lost+=c;if(x.due&&x.due<Date.now()&&x.status!=='wh')s.over++;});return s;}

/* ---------- DASHBOARD ---------- */
function renderDash(){
 const s=stats();
 const over=db.tools.filter(x=>x.due&&x.due<Date.now()&&x.status!=='wh');
 const pruef=db.tools.filter(x=>x.next_pruef&&x.next_pruef<Date.now()+86400000*30);
 $('#pane-dash').innerHTML=`
  <div class="kpis">
   <div class="kpi"><div class="kpi-t">${t('k_total')}</div><div class="kpi-v">${s.total}</div></div>
   <div class="kpi money"><div class="kpi-t">${t('k_value')}</div><div class="kpi-v">${fmt(s.value)}</div></div>
   <div class="kpi out"><div class="kpi-t">${t('k_out')}</div><div class="kpi-v">${fmt(s.out)}</div><div class="kpi-s">bei Mitarbeitern/Baustellen</div></div>
   <div class="kpi rep"><div class="kpi-t">${t('k_rep')}</div><div class="kpi-v">${fmt(s.rep)}</div></div>
   <div class="kpi lost"><div class="kpi-t">${t('k_lost')}</div><div class="kpi-v">${fmt(s.lost)}</div></div>
   <div class="kpi"><div class="kpi-t">${t('k_over')}</div><div class="kpi-v" style="color:${s.over?'var(--acc4)':'var(--acc3)'}">${s.over}</div></div>
  </div>
  <div class="sec-h">⏰ ${t('overdueH')}</div>
  ${over.length?tblTools(over):`<div class="empty">${t('allGood')}</div>`}
  <div class="sec-h">🔧 ${t('pruefH')}</div>
  ${pruef.length?tblTools(pruef):`<div class="empty">${t('allGood')}</div>`}`;
}

/* ---------- KATALOG ---------- */
let catFilter='';
function renderCat(){
 $('#pane-cat').innerHTML=`
  <div class="bar">
   <input class="search" id="cat-search" placeholder="${esc(t('search'))}" value="${esc(catFilter)}">
   <button class="btn acc" onclick="openEdit(null)">${t('add')}</button>
  </div>
  <div id="cat-list"></div>
  <div class="hint">ℹ️ ${lang==='ru'?'Каталог ведёт админ. Кладовщик выдаёт/принимает, но карточки заводишь ты. Для ~1000 позиций — импорт из таблицы и автоподтяжка цены из накладных (belege) на боевой версии.':'Katalog pflegt der Admin. Für ~1000 Stück: Import aus Tabelle + Preis-Autoübernahme aus belege in der Produktivversion.'}</div>`;
 $('#cat-search').oninput=e=>{catFilter=e.target.value;renderCatList();};
 renderCatList();
}
function renderCatList(){
 const q=catFilter.toLowerCase();
 const arr=db.tools.filter(x=>!q||x.name.toLowerCase().includes(q)||(x.inv||'').toLowerCase().includes(q));
 $('#cat-list').innerHTML=arr.length?tblTools(arr,true):`<div class="empty">—</div>`;
}
function statusPill(x){
 const over=x.due&&x.due<Date.now()&&x.status!=='wh';
 let m={wh:['wh','st_wh'],out:['out','st_out'],bau:['bau','st_bau'],rep:['rep','st_rep'],verloren:['over','st_lost'],lost:['over','st_lost']}[x.status]||['out','st_out'];
 return `<span class="pill ${m[0]}">${t(m[1])}</span>`+(over?` <span class="pill over">⏰</span>`:'');
}
function tblTools(arr,withOwnerCost){
 return `<div class="tbl-wrap"><table><thead><tr>
   <th>${t('col_tool')}</th><th>${t('col_status')}</th><th>${t('col_holder')}</th>
   ${withOwnerCost?`<th>${t('col_owner')}</th><th style="text-align:right">${t('col_value')}</th>`:''}
  </tr></thead><tbody>
  ${arr.map(x=>`<tr class="row" onclick="openTool('${x.id}')">
    <td><b>${x.icon} ${esc(x.name)}</b><div style="font-size:11px;color:var(--text3);font-family:var(--fn2)">${esc(x.inv||'')}</div></td>
    <td>${statusPill(x)}</td>
    <td>${x.status==='wh'?t('lager'):esc(holderName(x.holder))}</td>
    ${withOwnerCost?`<td><span class="pill ac">${esc(x.owner||'KL')}</span></td><td class="money" style="text-align:right">${fmt(x.cost)}</td>`:''}
  </tr>`).join('')}
  </tbody></table></div>`;
}

/* ---------- QR ---------- */
let qrScope='all';
function renderQR(){
 $('#pane-qr').innerHTML=`
  <div class="qr-tools">
   <b style="font-size:15px">🏷️ ${t('qrH')}</b>
   <span style="flex:1"></span>
   <button class="btn gh" onclick="window.print()">${t('printAll')}</button>
  </div>
  <div class="hint" style="margin-top:0;margin-bottom:14px">ℹ️ ${t('qrHint')}</div>
  <div class="qr-sheet" id="qr-sheet"></div>`;
 const box=$('#qr-sheet');
 box.innerHTML=db.tools.map((x,n)=>`<div class="qr-cell"><div class="qbox" id="aq-${n}"></div><div class="qlbl">${esc(x.inv||'')}</div><div class="qname">${x.icon} ${esc(x.name)}</div></div>`).join('');
 db.tools.forEach((x,n)=>{const el=$('#aq-'+n);if(el){el.innerHTML='';try{new QRCode(el,{text:x.qr,width:120,height:120,correctLevel:QRCode.CorrectLevel.H});}catch(e){}}});
}

/* ---------- BERICHTE (в €) ---------- */
function renderRep(){
 const grp={};
 db.tools.forEach(x=>{if(x.status==='wh'||x.status==='ausgemustert')return;const key=x.holder;grp[key]=grp[key]||{cnt:0,sum:0};grp[key].cnt++;grp[key].sum+=(x.cost||0);});
 const rows=Object.entries(grp).sort((a,b)=>b[1].sum-a[1].sum);
 $('#pane-rep').innerHTML=`
  <div class="sec-h">💶 ${t('repH')}</div>
  <div class="tbl-wrap"><table><thead><tr><th>${t('col_person')}</th><th style="text-align:right">${t('col_cnt')}</th><th style="text-align:right">${t('col_sum')}</th></tr></thead><tbody>
   ${rows.map(([k,v])=>`<tr><td><b>${esc(holderName(k))}</b></td><td style="text-align:right" class="money">${v.cnt}</td><td style="text-align:right" class="money">${fmt(v.sum)}</td></tr>`).join('')||`<tr><td colspan="3" class="empty">—</td></tr>`}
  </tbody></table></div>
  <div class="bar" style="margin-top:14px"><button class="btn gh" onclick="toast('${t('saved')}')">${t('export')}</button></div>
  <div class="hint">ℹ️ ${t('repHint')}</div>`;
}

/* ---------- TOOL DETAIL / EDIT ---------- */
function openSheet(html){$('#sheet-card').innerHTML=html;$('#sheet').classList.add('open');}
function closeSheet(){$('#sheet').classList.remove('open');}
$('#sheet').addEventListener('click',e=>{if(e.target.id==='sheet')closeSheet();});

function openTool(id){
 const x=db.tools.find(t=>t.id===id);if(!x)return;
 const ac=assetClass(x.cost);
 const rows=[...(x.hist||[])].sort((a,b)=>b.ts-a.ts).map(h=>`<div class="tl-i"><div class="tl-t">${t(h.type)}</div><div class="tl-d">${esc(holderName(h.who))}${h.to?' → '+esc(holderName(h.to)):''} · ${new Date(h.ts).toLocaleDateString('de-DE')}</div></div>`).join('');
 openSheet(`<div class="sh-h">${x.icon} ${esc(x.name)}</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${statusPill(x)}<span class="pill ac">${esc(x.inv||'')}</span><span class="pill ac">${esc(x.owner||'KL')}</span><span class="pill ac money">${fmt(x.cost)}</span>${ac?`<span class="pill ac">${t(ac)}</span>`:''}</div>
  <div class="qbox" id="det-qr" style="width:130px;height:130px;background:#fff;border-radius:10px;padding:8px;margin:4px 0 12px"></div>
  <div class="sec-h" style="margin-top:4px">🕓 ${t('hist')}</div><div class="tl">${rows||'—'}</div>
  <div class="bar" style="margin-top:16px">
   <button class="btn acc" onclick="openEdit('${x.id}')">✏️ ${t('editH')}</button>
   <button class="btn gh" onclick="window.print()">${t('printQR')}</button>
   <button class="btn gh" onclick="closeSheet()">${t('close')}</button>
  </div>`);
 const el=$('#det-qr');el.innerHTML='';try{new QRCode(el,{text:x.qr,width:114,height:114,correctLevel:QRCode.CorrectLevel.H});}catch(e){}
}

function openEdit(id){
 const x=id?db.tools.find(t=>t.id===id):{name:'',cat:'c1',inv:'',serial:'',owner:'KL',cost:'',icon:'🧰'};
 openSheet(`<div class="sh-h">${id?t('editH'):t('addH')}</div>
  <div class="field"><label>${t('f_name')} *</label><input id="e-name" value="${esc(x.name)}"></div>
  <div class="field row2">
   <div><label>${t('f_cat')}</label><select id="e-cat">${CATS.map(c=>`<option value="${c.id}" ${x.cat===c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('')}</select></div>
   <div><label>${t('f_inv')}</label><input id="e-inv" value="${esc(x.inv||'')}" placeholder="WZ-053"></div>
  </div>
  <div class="field row2">
   <div><label>${t('f_owner')}</label><select id="e-owner">${OWNERS.map(o=>`<option ${x.owner===o?'selected':''}>${o}</option>`).join('')}</select></div>
   <div><label>${t('f_serial')}</label><input id="e-serial" value="${esc(x.serial||'')}"></div>
  </div>
  <div class="field row2">
   <div><label>${t('f_cost')}</label><input id="e-cost" type="number" value="${x.cost||''}" oninput="showAsset()"></div>
   <div><label>${t('f_pruef')}</label><input id="e-pruef" type="date"></div>
  </div>
  <div class="assetline" id="asset-line"></div>
  <div class="bar" style="margin-top:16px">
   <button class="btn acc" onclick="saveTool('${id||''}')">${t('save')}</button>
   <button class="btn gh" onclick="closeSheet()">${t('cancel')}</button>
  </div>`);
 showAsset();
}
function showAsset(){const v=$('#e-cost')?$('#e-cost').value:'';const ac=assetClass(v);$('#asset-line').innerHTML=ac?`${t('assetLbl')} <b>${t(ac)}</b>`:'';}
function saveTool(id){
 const name=$('#e-name').value.trim();if(!name){$('#e-name').focus();return;}
 const cat=$('#e-cat').value,ico=(CATS.find(c=>c.id===cat)||{}).icon||'🧰';
 const data={name,cat,inv:$('#e-inv').value.trim(),owner:$('#e-owner').value,serial:$('#e-serial').value.trim(),cost:+$('#e-cost').value||0,icon:ico};
 if(id){Object.assign(db.tools.find(t=>t.id===id),data);}
 else{const nid='t'+(Date.now());const tok='KLW:'+Math.abs((name+Date.now()).split('').reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0,0)).toString(16).slice(0,4);
   db.tools.push({id:nid,qr:tok,status:'wh',holder:'wh',hist:[{ts:Date.now(),type:'t_return',who:'wh'}],...data});}
 save();closeSheet();refresh();toast(t('saved'));
}

/* ---------- навигация ---------- */
function refresh(){renderDash();renderCat();renderQR();renderRep();document.querySelectorAll('[data-k]').forEach(el=>el.textContent=t(el.getAttribute('data-k')));$('#rolename').textContent=lang==='ru'?'Админ':'Admin';}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===b));
 document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
 $('#pane-'+b.dataset.p).classList.add('on');
});
document.querySelectorAll('.lang button').forEach(b=>b.onclick=()=>{lang=b.dataset.l;localStorage.setItem('kl_wz_lang',lang);document.documentElement.lang=lang;document.querySelectorAll('.lang button').forEach(x=>x.classList.toggle('on',x===b));refresh();});
const THEMES=['t4','t1','t2'];
$('#btn-theme').onclick=()=>{let i=THEMES.indexOf(document.documentElement.getAttribute('data-theme'));i=(i+1)%THEMES.length;document.documentElement.setAttribute('data-theme',THEMES[i]);localStorage.setItem('kl_wz_theme',THEMES[i]);};

document.documentElement.setAttribute('data-theme',localStorage.getItem('kl_wz_theme')||'t4');
document.documentElement.lang=lang;
document.querySelectorAll('.lang button').forEach(x=>x.classList.toggle('on',x.dataset.l===lang));
refresh();
</script>
</body>
</html>
